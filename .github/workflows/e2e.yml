name: e2e

on:
  workflow_dispatch:
    inputs:
      api_base:
        type: string
        default: https://dota.haglund.dev
        required: false
        description: "The base URL of the API to test"
  #schedule:
  #  - cron: "0 */4 * * *" # https://crontab.guru/#0_*/4_*_*_*

permissions:
  contents: read

concurrency:
  group: e2e
  cancel-in-progress: true

env:
  API_BASE: ${{ inputs.api_base || 'https://dota.haglund.dev' }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 25

      - run: corepack enable

      - name: find pnpm cache path
        id: cache
        run: echo "path=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ steps.cache.outputs.path }}
          key: v1-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            v1-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - run: node --run test:e2e

      - name: ntfy_action
        uses: NiNiyas/ntfy-action@96acac57fdc91d4c4f50b78486c1ed6f03f9f61c # V1.0.5
        if: ${{ failure() }}
        with:
          url: ${{ secrets.NTFY_URL }}
          topic: ${{ secrets.NTFY_TOPIC }}
          headers: ${{ secrets.NTFY_TOKEN }}
          title: dota-matches-api warning
          tags: warning
